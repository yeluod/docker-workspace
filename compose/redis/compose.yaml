name: redis-server

services:
  redis:
    image: redis:7
    container_name: redis-server
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - sh
      - -c
      - exec redis-server /usr/local/etc/redis/redis.conf --requirepass "$$REDIS_PASSWORD"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -h 127.0.0.1 -p 6379 -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - /Users/wang/workspace/docker_work/redis:/data
      - ./conf/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - redis_net

networks:
  redis_net:
    driver: bridge
